<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>أحسب المرتب يا جعان</title>
</head>

<body>

    
    <div class="container">
        <div class="card">
            <div class="nav">
                <button onclick="changePeriod(-1)">▶</button>
                <span id="periodLabel"></span>
                <button onclick="changePeriod(1)">◀</button>
            </div>
        </div>

        <div class="legend" id="legend"></div>

        <div class="card">
            <h2>أيام الشهر</h2>
            <div class="weekdays" id="weekdays"></div>
            <div class="cal" id="calendar"></div>
            <div class="popup" id="popup">
                <p id="popupLabel"></p>
                <div class="popup-grid" id="popupGrid"></div>
            </div>
        </div>

        <div class="counts" id="counts"></div>

        <div class="card" style="margin-top:16px">
            <h2>إضافات أخرى</h2>
            <div class="extras">
                <div><label>💰 اضافي أخر</label><input type="number" id="bonus" value="0" oninput="save();render()">
                </div>
                <div><label>🚌 سلف وخصومات</label><input type="number" id="transport" value="0"
                        oninput="save();render()">
                </div>
                <div><label>🎁 السنوي</label><input type="number" id="annual" value="0" oninput="save();render()"></div>
            </div>
        </div>
        <div class="card" id="prevMonthTotal">
            <h2>📦 مرتب الشهر اللي فات</h2>
            <div class="row grand">
                <span>القبض كان :</span>
                <span style="font-weight: 800;" id="prevMonthValue">0 جنيه</span>
            </div>
        </div>
        <!-- Current month total -->
        <div class="card totals" id="totals"></div>

        <!-- All months grand total -->
        <div class="card all-total" id="allTotals"></div>

        <div style="text-align:center;margin-top:12px">
            <button class="reset-btn danger" onclick="resetAll()">🗑️ مسح البانات </button>
            <button class="reset-btn" onclick="archiveAndReset()">📦 حفظ + وبدء شهر جديد</button>
        </div>
    </div>

    <script src="app.js"> </script>
</body>

</html>
