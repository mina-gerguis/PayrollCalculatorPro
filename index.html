<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Mondelez-International.ico">

    <link rel="apple-touch-icon" href="Mondelez-International.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="مرتب">

    <title>المرتب كام؟</title>
</head>

<body>
    <img src="Mondelez-International.ico" alt="" width="10">
    <div class="container">
        <div class="card">
            <div class="nav">
                <button onclick="changePeriod(-1)">▶</button>
                <span id="periodLabel"></span>
                <button onclick="changePeriod(1)">◀</button>
            </div>
        </div>

        <div class="legend" id="legend"></div>

        <div class="card">
            <h2>أيام الشهر</h2>
            <div class="weekdays" id="weekdays"></div>
            <div class="cal" id="calendar"></div>
            <div class="popup" id="popup">
                <p id="popupLabel"></p>
                <div class="popup-grid" id="popupGrid"></div>
            </div>
        </div>

        <div class="counts" id="counts"></div>

        <div class="card" style="margin-top:16px">
            <h2>إضافات أخرى</h2>
            <div class="extras">
                <div><label>بدل مواصلات 🚌</label><input type="number" id="bonus" value="0" oninput="save();render()"></div>
                <div><label>🚫 سلف وخصومات</label><input type="number" id="transport" value="0" oninput="save();render()"></div>
                <div><label>يومين الثانوي 💰</label><input type="number" id="annual" value="440" oninput="save();render()"></div>
                <div><label>الحافز 🎁</label><input type="number" id="incentive" value="400" oninput="save();render()"></div>
            </div>
        </div>
        
        <div class="card totals" id="currentMonthBreakdown"></div>

        <div class="card" id="prevMonthTotal">
            <h2>📦 قبض الشهر اللي فات</h2>
            <div class="row grand">
                <span>القبض كان :</span>
                <span style="font-weight: 800;" id="prevMonthValue">0 جنيه</span>
            </div>
        </div>

        <div class="card all-total" id="allTotals"></div>

        <div style="text-align:center;margin-top:12px">
            <button class="reset-btn danger" onclick="resetAll()">🗑️ مسح البيانات </button>
            <button class="reset-btn save" onclick="archiveAndReset()">📦 حفظ + وبدء من جديد</button>
        </div>
    </div>

    <script src="app.js"> </script>
</body>

</html>
